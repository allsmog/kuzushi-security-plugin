name: test

# Runs the committed test suite on every push and PR so a regression in the
# shared contracts (findings index/schema, verdict→status maps, the policy/
# attestation gate, and the prepare/finalize validators) can't land silently —
# the gap that let /rule-synth ship broken before the suite existed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # ripgrep is the scanners' workhorse: the producer prepares (sast,
      # sharp-edges, crypto-review, authz, iac, supply-chain, …) shell out to `rg`
      # to find candidate sites, and their tests assert real detections. Stock
      # ubuntu runners don't ship rg, so without this those scans find nothing and
      # the tests fail (they pass locally only because dev machines have rg).
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      # The suite is otherwise dependency-free — it imports only scripts/lib and
      # scripts/cmd (Node built-ins). No `npm ci` (avoids lockfile drift while the
      # plugin's heavy optional deps churn). Engine-backed tests (a real Joern
      # /rule-synth run) still self-skip when joern/codeql aren't on PATH, and the
      # compile/run sanitizer tests self-skip when no C compiler is present
      # (ubuntu-latest ships gcc, so they DO run here — their fuzz PRNG is the
      # embedded xorshift in fuzz-driver.c precisely so a fixed-seed run reproduces
      # identically on this Linux runner and on a macOS dev box, with no rand() flake).
      #
      # What is DELIBERATELY not gated here: the LLM-in-the-loop eval (`npm run
      # eval:cve`). It spawns real `claude -p` sessions — billed, nondeterministic,
      # minutes-to-hours long — so it is a manual measurement (see eval/README.md),
      # never a blocking CI check. This `npm test` (deterministic, fast, free) is the
      # gate; the eval is the instrument you run by hand to move the find-rate number.
      - run: npm test
